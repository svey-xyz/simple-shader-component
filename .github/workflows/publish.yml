name: Publish

on:
  push:
    branches:
      - production
    paths:
      - package.json # version bumps always touch package.json

permissions:
  id-token: write # npm trusted publishing (OIDC)
  contents: write # tag + GitHub release

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect version change
        id: version
        run: |
          NAME=$(jq -r .name package.json)
          LOCAL=$(jq -r .version package.json)
          PUBLISHED=$(npm view "$NAME" version 2>/dev/null || echo "none")
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Publishing $NAME@$LOCAL (npm has $PUBLISHED)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$LOCAL already published — skipping"
          fi

      - name: Set up Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never use caching in release builds

      - name: Set up Bun
        if: steps.version.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun i

      - name: Build the project
        if: steps.version.outputs.changed == 'true'
        run: bun run build

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
