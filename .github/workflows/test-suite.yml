# Reusable test runner. Each suite gets its own thin caller workflow
# (test-core.yml, test-react.yml, ...) because GitHub status badges are
# per-workflow — adding a framework later is one new test dir + one small
# caller file.
name: Test Suite

on:
  workflow_call:
    inputs:
      suite:
        description: Directory under test/ to run
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ inputs.suite }} tests
        run: bun test test/${{ inputs.suite }}
